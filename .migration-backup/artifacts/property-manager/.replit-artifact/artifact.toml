kind = "web"
previewPath = "/"
title = "Property Manager"
version = "1.0.0"
id = "artifacts/property-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21844

[services.development]
run = "pnpm --filter @workspace/property-manager run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/property-manager", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/property-manager", "run", "start"]

[services.production.run.env]
PORT = "21844"
NODE_ENV = "production"

[services.env]
PORT = "21844"
