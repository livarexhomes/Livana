kind = "web"
previewPath = "/"
title = "Livana Property Manager"
version = "1.0.0"
id = "artifacts/property-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21844

[services.development]
run = "pnpm --filter @workspace/property-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/property-manager", "run", "build" ]
publicDir = "artifacts/property-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21844"
BASE_PATH = "/"
